<body>

<header class="dashboard-header">
    <h1>Hariom IoT</h1>

    <div class="user-info">
        <span id="username">Loading...</span>
        <button id="logoutBtn">Logout</button>
    </div>
</header>

<main class="dashboard">

    <h2>Connected Devices</h2>

    <div id="devices">

        <div class="device-card">
            <h3>Bulb 1</h3>

            <span id="bulb1-status">OFF</span>

            <button data-device="1">Toggle</button>
        </div>

        <div class="device-card">
            <h3>Bulb 2</h3>

            <span id="bulb2-status">OFF</span>

            <button data-device="2">Toggle</button>
        </div>

        <div class="device-card">
            <h3>Bulb 3</h3>

            <span id="bulb3-status">OFF</span>

            <button data-device="3">Toggle</button>
        </div>

        <div class="device-card">
            <h3>Bulb 4</h3>

            <span id="bulb4-status">OFF</span>

            <button data-device="4">Toggle</button>
        </div>

    </div>

</main>

<script src="js/dashboard.js"></script>

</body>
